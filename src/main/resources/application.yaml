spring:
  application:
    name: auth-service

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      authorizationserver:
        issuer: ${ISSUER_URI:http://localhost:9000}

server:
  port: ${SERVER_PORT:9000}

app:
  demo-client:
    id: ${DEMO_CLIENT_ID:demo-client}
    secret: ${DEMO_CLIENT_SECRET}

logging:
  level:
    "[org.springframework.security]": DEBUG
    "[ep.example.auth]": DEBUG
